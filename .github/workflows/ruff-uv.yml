name: uv Ruff, Unittest

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      LANG: es_ES.UTF-8
      LC_ALL: es_ES.UTF-8
      QT_QPA_PLATFORM: offscreen
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
        - uses: actions/checkout@v7
        - name: Install the latest version of uv and set the python version
          uses: astral-sh/setup-uv@v7
          with:
            python-version: ${{ matrix.python-version }}
            version: latest
            enable-cache: true
        - name: Install project and dev dependencies
          run: uv sync --group dev
        - name: Install system dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y \
              gettext \
              locales \
              libegl1 \
              libgl1 \
              libglib2.0-0 \
              libpulse0 \
              libxkbcommon-x11-0 \
              libxcb-cursor0 \
              libxcb-icccm4 \
              libxcb-image0 \
              libxcb-keysyms1 \
              libxcb-randr0 \
              libxcb-render-util0 \
              libxcb-xinerama0 \
              libxcb-xfixes0 \
              libfontconfig1 \
              libxrender1 \
              libxi6 \
              libxext6 \
              libx11-6
            sudo locale-gen es_ES.UTF-8
        - name: Compile gettext catalogs (.po → .mo)
          run: uv run python scripts/manage_translations.py compile
          env:
            LANG: es_ES.UTF-8
            LC_ALL: es_ES.UTF-8
            QT_QPA_PLATFORM: offscreen
        - name: Lint with ruff
          run: |
            # stop the build if there are Python syntax errors or undefined names
            uv run ruff check --output-format=github --select=E9,F63,F7,F82 --target-version=py311 .
            # project rules (version pinned in uv.lock via dev group)
            uv run ruff check --config=pyproject.toml --output-format=github .
        - name: Test with unittest
          run: uv run python -m unittest discover
        - name: Ruff Formatter
          run: uv run ruff format --check .
        - name: Mypy
          run: uv run mypy
        - name: Coverage
          run: |
            uv run coverage run --branch -m unittest discover
            uv run coverage report -m
        - name: Map layout overlaps
          run: |
            uv run python scripts/check_map_overlaps.py \
              --max-bbox-pairs 75 \
              --fail-on-cross-continent \
              --allow-cross Groenlandia:Islandia
