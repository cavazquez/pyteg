name: uv Ruff, Unittest

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
        - uses: actions/checkout@v6
        - name: Install the latest version of uv and set the python version
          uses: astral-sh/setup-uv@v7
          with:
            python-version: ${{ matrix.python-version }}
            version: latest
            enable-cache: true
        - name: Install project and dev dependencies
          run: uv sync --group dev
        - name: Install gettext (msgfmt)
          run: sudo apt-get update && sudo apt-get install -y gettext
        - name: Compile gettext catalogs (.po → .mo)
          run: uv run python scripts/manage_translations.py compile
        - name: Lint with ruff
          run: |
            # stop the build if there are Python syntax errors or undefined names
            uv run ruff check --output-format=github --select=E9,F63,F7,F82 --target-version=py311 .
            # project rules (version pinned in uv.lock via dev group)
            uv run ruff check --config=pyproject.toml --output-format=github .
        - name: Test with unittest
          run: uv run python -m unittest discover
        - name: Ruff Formatter
          run: uv run ruff format --check .
        - name: Mypy
          run: uv run mypy
        - name: Coverage
          run: |
            uv run coverage run --branch -m unittest discover
            uv run coverage report -m
