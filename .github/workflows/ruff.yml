name: Ruff, Unittest, Black

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-action.txt
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check --output-format=github --select=E9,F63,F7,F82 --ignore=RUF100 --target-version=py311 .
          # default set of ruff rules with GitHub Annotations
          ruff check --config=pyproject.toml --output-format=github .
      - name: Test with unittest
        run: |          
          python -m unittest discover
      - name: Black Formatter
        run: |
          black --check .        
