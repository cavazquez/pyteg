[tool.isort]
py_version=311
profile = "black"
src_paths = ["src", "tests"]
overwrite_in_place = true

[tool.black]
target-version = ["py311"]

[tool.ruff]
target-version = "py311"
select = ["E", # default
	  "F", # default
	  "I", # isort
	  "UP", # pyupgrade
	  "C4", # flake8-comprehensions
	  "RET", # flake8-return
	  "ARG", # flake8-unused-arguments
	 ]

[tool.pyright]
pythonVersion = "3.11"
include = ["src", "tests"]
