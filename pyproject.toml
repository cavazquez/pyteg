[project]
name = "pyteg"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "pyside6==6.9.1",
]

[project.scripts]
pyteg-client = "src.run_client:main"
pyteg-server = "src.server:main"

[tool.ruff.format]
preview = true

[tool.ruff.lint]
preview = true
select = [
	  "ALL", 
	 ]
ignore = [
	"D", # pydocstyle
	"CPY", # flake8-copyright
	"DJ",  # flake8-django
	"T20", # flake8-print
	"PT",  # flake8-pytest-style
	"AIR", # Airflow
	"ANN", # flake8-annotations 
	"COM812",    # missing-trailing-comma ; ruff format
	"ISC001",    # single-line-implicit-string-concatenation ; ruff format
	# Revisar los siguientes
	#"BLE001", # blind-except
	"PLR0904", # too-many-public-methods 	
	#"PLR0911", # too-many-return-statements
	#"PLR0914", # too-many-locals
	"PLR2004", # magic-value-comparison
	"PLR6301", # no-self-use
	"ERA001",  # commented-out-code
	"C901",    # complex-structure
	"DOC201",    # docstring-missing-returns
	]

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pyside6-stubs>=6.7.3.0",
    "typing-extensions>=4.14.1",
    "ruff",
    "nuitka>=2.7.12",
    "hatch",
    "hatch-nuitka",
]


[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "skip"
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
strict_equality = true
disallow_incomplete_defs = false
disallow_untyped_defs = false
check_untyped_defs = false
explicit_package_bases = true
modules = [
  "src.gui_admin",
  "src.client_msg",
  "src.client_transmisor",
  "src.server",
  "src.server_tasks",
  # Nuevos módulos añadidos para ampliar el chequeo
  "src.client_connection",
  "src.client_tasks",
  "src.server_game",
  "src.server_mapa",
  "src.server_msg",
  "src.server_state_validator",
  "src.server_player",
  "src.gui_toolbar",
  "src.gui_scene",
  "src.gui_chat",
]

[build-system]
requires = ["hatchling>=1.18", "hatch-nuitka"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.hatch.build.targets.nuitka]
# Entradas a compilar con Nuitka
main = [
  "src/server.py",
  "src/run_client.py",
]
onefile = true
standalone = true
output-dir = "dist"

