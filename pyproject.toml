[tool.isort]
py_version=311
profile = "black"
src_paths = ["src", "tests"]
overwrite_in_place = true

[tool.black]
target-version = ["py311"]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
preview = true
select = ["E", # default
	  "F", # default
	  "I", # isort
	  "Q", # flake8-quotes 
	  "G", # flake8-logging-format
	  "ISC", # flake8-implicit-str-concat
	  "DTZ", # flake8-datetimez
	  "COM", # flake8-commas
	  "UP", # pyupgrade
	  "C4", # flake8-comprehensions
	  "RET", # flake8-return
	  "ARG", # flake8-unused-arguments
	  "FURB", # refurb
	  "PIE", # flake8-pie
	  "LOG", # flake8-logging
	  "PGH", # pygrep-hooks
	  "RUF", # Ruff-specific rules 
	  "PERF101", # unnecessary-list-cast
	  "FURB132", # check-and-remove-from-set
	  "PERF401", # manual-list-comprehension
	 ]

[tool.pyright]
pythonVersion = "3.11"
include = ["src", "tests"]
